<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../styles/output.css" />
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <title>Login</title>
  </head>

  <body class="bg-zinc-50 h-screen">
    <nav
      id="navbar"
      class="fixed top-0 left-0 right-0 bg-indigo-700 h-16">
    </nav>

<div id="notification" class="fixed top-24 right-6 z-50 flex flex-col gap-3 max-w-md"></div>

    <div
      class="pt-16 h-screen flex max-w-7xl mx-auto justify-center items-center px-4 gap-x-12">
      <div class="hidden lg:flex w-2/4 justify-center items-center">
      </div>
      <form
        id="form"
        class="flex flex-col gap-4 bg-zinc-200 p-4 rounded-lg text-md shadow-lg lg:w-2/4">

        <!-- Correo -->
        <div class="flex flex-col gap-2">
          <label
            for="email-input"
            class="font-bold text-zinc-900">
            Correo
            <span class="text-red-500">*</span>
          </label>
          <input
            type="email"
            id="email-input"
            name="email-input"
            autocomplete="off"
            class="rounded-lg p-2 bg-zinc-100"
          />
          <p class="text-xs text-zinc-800">
            
          </p>
        </div>

        <!-- Contraseña -->
        <div class="flex flex-col gap-2">
          <label
            for="password-input"
            class="font-bold text-zinc-900">
            Contraseña
            <span class="text-red-500">*</span>
          </label>
          <input
            type="password"
            id="password-input"
            name="password-input"
            autocomplete="off"
            class="rounded-lg p-2 bg-zinc-100"
          />
          <p class="text-xs text-zinc-800"></p>
        </div>

        <!-- Botón -->
        <button
          id="form-btn"
          class="bg-indigo-700 py-2 px-4 rounded-lg font-bold text-white hover:bg-indigo-800 text-center transition ease-in-out disabled:opacity-50 disabled:cursor-not-allowed">
          Iniciar Sesión
        </button>
      </form>
    </div>

<div class="hidden
  outline
  outline-2
  outline-green-700
  outline-red-700
  outline-indigo-700">
</div>

    <script src="index.js"></script>
  </body>
</html>
