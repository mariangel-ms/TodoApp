<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
    <title>Todo App</title>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .tech-font { font-family: 'JetBrains Mono', monospace; }
    </style>
</head>
<body class="h-screen pt-16 w-full bg-zinc-900 text-zinc-100 antialiased selection:bg-purple-500/30 selection:text-purple-200">
    
    <nav id="navbar" class="fixed top-0 right-0 left-0 bg-zinc-950/80 backdrop-blur-md h-16 border-b border-zinc-900 z-50">
    </nav>

    <div class="w-full h-[calc(100vh-4rem)] bg-zinc-950">
        <div class="h-full p-4 flex flex-col justify-center max-w-4xl mx-auto">
            
            <h1 class="h-[15%] flex justify-center items-center text-center text-4xl md:text-7xl font-extrabold tracking-tighter tech-font bg-gradient-to-r from-purple-400 to-fuchsia-500 bg-clip-text text-transparent">
                TODO APP
            </h1>
            
            <div class="w-full max-w-2xl mx-auto flex flex-col h-[70%] bg-zinc-900/40 border border-zinc-800/80 rounded-2xl shadow-2xl backdrop-blur-sm overflow-hidden mt-4">
                
                <form id="form" class="border-b border-zinc-800/60 bg-zinc-900/20 p-4">
                    <div class="w-full flex flex-row justify-between items-center gap-4">
                        <input type="text" name="new-todo" placeholder="Create some task..." 
                            class="w-full p-3 bg-zinc-950/50 border border-zinc-800 text-zinc-100 placeholder-zinc-500 text-sm md:text-base rounded-xl grow outline-none focus:border-purple-500 focus:ring-1 focus:ring-purple-500/50 transition-all duration-300" required>
                        
                        <button class="add-btn p-3 bg-purple-600 hover:bg-purple-500 text-white rounded-xl cursor-pointer shadow-lg shadow-purple-600/20 hover:scale-105 active:scale-95 transition-all duration-300 ease-in-out">
                            <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4" />
                            </svg>
                        </button>
                    </div>
                    <p class="invalid-check hidden pl-2 pt-2 text-rose-500 text-xs font-medium">A task must be provided.</p>
                </form>
                
                <div class="overflow-y-auto grow bg-zinc-900/10 p-2">
                    <ul class="divide-y divide-zinc-800/50 text-zinc-300 text-sm md:text-base">
                    </ul>
                </div>
                
                <div class="w-full p-4 flex flex-row justify-between sm:justify-center items-center gap-2 sm:gap-6 border-t border-zinc-800/60 bg-zinc-900/40 text-xs font-semibold tracking-wide uppercase">
                    <span class="total-todos px-3 py-1.5 bg-zinc-800/80 border border-zinc-700/50 text-zinc-400 rounded-lg">
                        Total: <span class="total-count text-purple-400 font-bold ml-1 tech-font text-sm"></span>
                    </span>
                    <span class="completed-todos px-3 py-1.5 bg-emerald-950/40 border border-emerald-800/40 text-emerald-500 rounded-lg">
                       Completed: <span class="completed-count font-bold ml-1 tech-font text-sm"></span>
                    </span>
                    <span class="incompleted-todos px-3 py-1.5 bg-rose-950/40 border border-rose-800/40 text-rose-400 rounded-lg">
                        Incompleted: <span class="incompleted-count font-bold ml-1 tech-font text-sm"></span>
                    </span>
                </div>

            </div>
        </div>
    </div>

    <script type="text/javascript" src="./index.js"></script>
    <script src="/components/nav.js"></script>
</body>
</html>
