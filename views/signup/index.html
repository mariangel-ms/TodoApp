<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Registro</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  </head>

 <body class="bg-zinc-800 min-h-screen font-sans antialiased selection:bg-purple-500 selection:text-white">
    <nav
      id="navbar"
      class="fixed top-0 left-0 right-0 bg-zinc-900/80 backdrop-blur-md border-b border-zinc-800 h-16 z-40 shadow-xl"
    ></nav>

    <div
      id="notification"
      class="fixed top-24 right-6 z-50 flex flex-col gap-3 max-w-md w-full px-4"
    ></div>

    <div
      class="pt-16 min-h-screen flex max-w-7xl mx-auto justify-center items-center px-4 md:px-8 gap-x-16"
    >
      <div class="hidden lg:flex w-1/2 justify-center items-center opacity-85 hover:opacity-100 transition-opacity duration-300"> 
        <img class="w-4/5 h-auto max-h-[480px] object-contain drop-shadow-[0_0_25px_rgba(168,85,247,0.15)]" src="../img/signup.svg" alt="Ilustración de registro"/>
      </div>

      <div class="w-full lg:w-1/2 max-w-md">
        <form
          id="form"
          class="flex flex-col gap-5 bg-zinc-900/50 border border-zinc-800 p-8 rounded-2xl shadow-2xl backdrop-blur-sm"
        >
          <div class="mb-1">
            <h1 class="text-2xl font-bold text-white tracking-tight bg-gradient-to-r from-purple-400 to-fuchsia-500 bg-clip-text text-transparent">
              Crea tu cuenta
            </h1>
            <p class="text-sm text-zinc-400 mt-1">Completa los datos para comenzar tu experiencia.</p>
          </div>

          <div class="flex flex-col gap-1.5">
            <label for="name-input" class="text-xs font-bold tracking-wider text-zinc-300 uppercase">
              Nombre completo
              <span class="text-purple-400">*</span>
            </label>
            <input
              type="text"
              id="name-input"
              name="name-input"
              autocomplete="name"
              placeholder="Ingresa tu nombre y apellido"
              class="w-full rounded-xl border border-zinc-800 bg-zinc-950/80 p-3 text-sm text-zinc-100 placeholder-zinc-600 focus:border-purple-500 focus:ring-4 focus:ring-purple-500/10 focus:outline-none transition-all duration-200"
            />
            <p class="text-xs text-zinc-500 leading-normal">
              Tanto el nombre como el apellido deben comenzar en mayúsculas.
            </p>
          </div>

          <div class="flex flex-col gap-1.5">
            <label for="email-input" class="text-xs font-bold tracking-wider text-zinc-300 uppercase">
              Correo electrónico
              <span class="text-purple-400">*</span>
            </label>
            <input
              type="email"
              id="email-input"
              name="email-input"
              autocomplete="email"
              placeholder="ejemplo@correo.com"
              class="w-full rounded-xl border border-zinc-800 bg-zinc-950/80 p-3 text-sm text-zinc-100 placeholder-zinc-600 focus:border-purple-500 focus:ring-4 focus:ring-purple-500/10 focus:outline-none transition-all duration-200"
            />
          </div>

          <div class="flex flex-col gap-1.5">
            <label for="password-input" class="text-xs font-bold tracking-wider text-zinc-300 uppercase">
              Contraseña
              <span class="text-purple-400">*</span>
            </label>
            <input
              type="password"
              id="password-input"
              name="password-input"
              autocomplete="new-password"
              placeholder="••••••••"
              class="w-full rounded-xl border border-zinc-800 bg-zinc-950/80 p-3 text-sm text-zinc-100 placeholder-zinc-600 focus:border-purple-500 focus:ring-4 focus:ring-purple-500/10 focus:outline-none transition-all duration-200"
            />
            <div class="bg-zinc-950/40 border border-zinc-800/60 rounded-xl p-3.5 mt-1">
              <p class="text-xs text-zinc-400 space-y-1.5 font-medium">
                <span class="block">• Debe tener al menos una letra.</span>
                <span class="block">• Debe tener al menos un número.</span>
                <span class="block">• Debe tener al menos 8 caracteres.</span>
              </p>
            </div>
          </div>

          <div class="flex flex-col gap-1.5">
            <label for="match-input" class="text-xs font-bold tracking-wider text-zinc-300 uppercase">
              Confirmar contraseña
              <span class="text-purple-400">*</span>
            </label>
            <input
              type="password"
              id="match-input"
              name="match-input"
              autocomplete="new-password"
              placeholder="••••••••"
              class="w-full rounded-xl border border-zinc-800 bg-zinc-950/80 p-3 text-sm text-zinc-100 placeholder-zinc-600 focus:border-purple-500 focus:ring-4 focus:ring-purple-500/10 focus:outline-none transition-all duration-200"
            />
          </div>

          <button
            id="form-btn"
            disabled
            class="w-full mt-3 bg-purple-600 hover:bg-purple-500 active:bg-purple-700 py-3.5 px-4 rounded-xl font-bold text-sm text-white shadow-lg shadow-purple-600/20 text-center tracking-wide transition-all duration-200 ease-in-out disabled:opacity-30 disabled:shadow-none disabled:cursor-not-allowed"
          >
            Registrar cuenta
          </button>
        </form>
      </div>
    </div>

    <div class="hidden outline-green-700 outline-red-700 outline-indigo-700 outline-purple-700"></div>

    <script type="module" src="index.js"></script>
    <script type="module" src="/components/notification.js"></script>
    <script src="/components/nav.js"></script>
  </body>
</html>
