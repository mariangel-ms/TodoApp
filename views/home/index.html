<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- <link rel="stylesheet" href="/styles/output.css" /> -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>TodoApp</title>
  </head>
  <body
    class="bg-zinc-900 min-h-screen font-sans antialiased selection:bg-purple-500 selection:text-white"
  >
    <!-- Navbar unificada con efecto glassmorphism -->
    <nav
      id="navbar"
      class="fixed top-0 left-0 right-0 bg-zinc-900/80 backdrop-blur-md border-b border-zinc-800 h-16 z-40 shadow-xl"
    ></nav>

    <!-- Contenedor Principal Centrado -->
    <div
      class="pt-16 min-h-screen flex justify-center items-center flex-col px-4 gap-6 md:flex-row lg:w-3/5 md:w-10/12 md:mx-auto md:gap-12"
    >
      <!-- Título con degradado neon -->
      <h1
        class="font-black text-5xl md:text-7xl tracking-tight bg-gradient-to-r from-purple-400 via-fuchsia-500 to-indigo-500 bg-clip-text text-transparent drop-shadow-[0_0_30px_rgba(168,85,247,0.2)] text-center md:text-left"
      >
        TodoApp
      </h1>

      <!-- Contenido y Botones de Acción -->
      <div class="flex flex-col gap-6 md:text-lg max-w-xl">
        <p class="text-zinc-400 text-justify leading-relaxed">
          Organiza tus tareas diarias, optimiza tu tiempo y mantén el control de
          tus proyectos en un solo lugar. Una interfaz diseñada para ayudarte a
          alcanzar tus objetivos diarios de forma rápida, intuitiva y sin
          distracciones.
        </p>

        <!-- Botones estilizados -->
        <div class="flex justify-around gap-4 mt-2">
          <!-- Botón de Login (Secundario/Contorno) -->
          <a
            class="w-1/2 text-center py-3 px-4 rounded-xl font-bold text-sm text-zinc-300 border border-zinc-800 bg-zinc-900/50 hover:bg-zinc-800 hover:text-white hover:border-zinc-700 tracking-wide transition-all duration-200 ease-in-out"
            href="/login/"
            >Login</a
          >
          <!-- Botón de Registro (Principal/Fusión Púrpura) -->
          <a
            class="w-1/2 text-center py-3 px-4 rounded-xl font-bold text-sm text-white bg-purple-600 hover:bg-purple-500 active:bg-purple-700 shadow-lg shadow-purple-600/20 tracking-wide transition-all duration-200 ease-in-out"
            href="/signup/"
            >Registro</a
          >
        </div>
      </div>
    </div>

    <script src="/components/nav.js"></script>
  </body>
</html>
